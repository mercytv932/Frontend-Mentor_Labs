<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <!-- font -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | QR code component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        background-color: #d5e1ef;
        font-family: "Outfit", san-serif;
      }

      .container {
        display: flex;
        padding: 16px 16px 40px;
        flex-direction: column;
        width: 320px;
        height: 499px;
        background-color: #fff;
        border-radius: 20px;
        text-align: center;
      }

      .container img {
        width: 288px;
        height: 288px;
        opacity: 100%;
        border-radius: 10px;
      }

      .texts {
        padding: 24px 16px 0;
      }

      .texts h1 {
        font-size: 22px;
        font-weight: 700;
        line-height: 1.2;
        /* text-align: center; */
        color: #1f314f;
        margin-bottom: 16px;
      }

      .texts p {
        color: #68778d;
        font-size: 15px;
        font-weight: 400;
        line-height: 1.4;
        letter-spacing: 0.2px;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <img src="images/image-qr-code.png" alt="click the QR code" />

      <div class="texts">
        <h1>Improve your froned-end skills by building projects.</h1>
        <p>
          Scan the QR code to visit the Frontend Mentor and take your coding
          skills tot he next level.
        </p>
      </div>
    </main>
  </body>
</html>
