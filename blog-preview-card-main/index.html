<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }

      
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    display: flex;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    background-color: #F4DD4E;
    font-family: "Outfit", san-serif;
  }

    main {
      width: 384px;
      height: 522px;
      background-color: #FFF;
      padding: 24px;
      gap: 24px;
      border-radius: 20px;
    }

    .card-img {
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .main-content {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 336px;
      height: 194px;
      
    }

    .learning-btn {
      width: 82px;
      height: 29px;
      background-color: #F4DD4E;
      color: #111;
      border-radius: 4px;
      padding: 4px 12px;
      text-decoration: none;
      font-weight: 700;
    }

    .date {
      color: #111;  
    }

    .main h3 {
      color: #111;
    }

    .detail {
      color: #6B6B6B;
      line-height: 2;
    }

    .greg {
      display: flex;
      flex-direction: row;
      width: 129px;
      height: 32px;
      justify-content: space-evenly;
      align-items: center;
      gap: 12px;
    }

    .greg img {
      width: 32px;
      height: 32px;

    }



    

  </style>
</head>
<body>
  <main class=".main">
    <img class="card-img" src="assets/images/illustration-article.svg" alt="blog image">
    <div class="main-content">
      <a class="learning-btn" href="">Learning</a>
      <p class="date">Published 21 Dec 2023</p>
      <h3>HTML & CSS foundations</h3>
      <p class="detail">These languages are the backbone of every
            website, defining structure, content, and presentation.</p>
    </div>
    <div class="greg">
      <img class="profile-img" src="assets/images/image-avatar.webp" alt="profile picture">
      <p>Greg Hooper</p>
    </div>
  </main>


  </footer>
</body>
</html>
