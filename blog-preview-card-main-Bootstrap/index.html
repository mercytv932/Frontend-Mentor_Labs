<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />

    <title>Blog preview card</title>

    <style></style>
  </head>

  <body class="d-flex align-items-center justify-content-center">
    <main class="blog-card bg-white p-4 rounded-4 border border-dark">
      <img
        class="card-img w-100 rounded-3 mb-3"
        src="assets/images/illustration-article.svg"
        alt="Blog image"
      />

      <div class="main-content d-flex flex-column gap-2">
        <a class="learning-btn" href="#"> Learning </a>

        <p class="date mb-0">Published 21 Dec 2023</p>

        <h3 class="fw-bold my-2">HTML &amp; CSS foundations</h3>

        <p class="detail mb-0">
          These languages are the backbone of every website, defining structure,
          content, and presentation.
        </p>
      </div>

      <div class="greg d-flex align-items-center gap-3 mt-3">
        <img
          class="rounded-circle"
          src="assets/images/image-avatar.webp"
          alt="Greg Hooper"
        />

        <p class="fw-bold mb-0">Greg Hooper</p>
      </div>
    </main>
  </body>
</html>
