<!doctype html>
<html lang="en">
  <head>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <title>Frontend Mentor | QR code component</title>
    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  </head>
  <body>
    <main class="qr-card   bg-white rounded-4 p-3 pb-5 text-center">
      <img
        class="rounded-3"
        src="images/image-qr-code.png"
        alt="click the QR code"
      />

      <div class="px-3 pt-4">
        <h1 class="fw-semibold mb-3">
          Improve your fronted-end skills by building projects.
        </h1>
        <p>
          Scan the QR code to visit the Frontend Mentor and take your coding
          skills to the next level.
        </p>
      </div>
    </main>
  </body>
</html>
